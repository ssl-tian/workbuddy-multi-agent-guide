# ============================================================
# 项目状态管理模板 — 跨 Session 不丢失进度
# ============================================================

project:
  name: "你的项目名"
  description: "一句话描述你的研究或项目"
  created: "YYYY-MM-DD"
  owner: "@your-github-username"

# ---------- 数据契约 ----------
data:
  source: "数据来源（如 NHANES 2005-2020）"
  sample_size: 0
  variables:
    exposure: "暴露变量名（如 heavy_drinking）"
    outcome: "结局变量名（如 depression）"
    covariates: []

# ---------- 阶段状态 ----------
stages:
  - name: "数据准备"
    status: "pending"  # pending | in_progress | completed | blocked
    gate_passed: false
  - name: "建模分析"
    status: "pending"
    gate_passed: false
  - name: "图表生成"
    status: "pending"
    gate_passed: false
  - name: "论文撰写"
    status: "pending"
    gate_passed: false
  - name: "审稿回复"
    status: "pending"
    gate_passed: false

# ---------- 验证门状态 ----------
gates:
  - id: "data_to_modeling"
    description: "变量定义完整 + 样本量确认 + 缺失数据报告"
    status: "pending"
  - id: "modeling_to_figures"
    description: "模型收敛 + 效应量合理 + 诊断通过"
    status: "pending"
  - id: "figures_to_writing"
    description: "图表文件存在 + 格式规范 + 数据映射正确"
    status: "pending"

# ---------- 产物清单 ----------
artifacts:
  - path: ""
    type: ""  # data | model | figure | manuscript
    description: ""
    created: ""

# ---------- 决策日志 ----------
decisions:
  - timestamp: ""
    decision: ""
    rationale: ""
    made_by: ""

# ---------- 错误日志 ----------
errors:
  - timestamp: ""
    error: ""
    fix: ""
    status: ""  # resolved | unresolved
